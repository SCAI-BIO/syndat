name: tests

permissions:
  contents: read
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python${{ matrix.python-version }}-bookworm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: uv sync --frozen --group dev

    - name: Lint with flake8
      run: |
        uv run flake8 syndat tests examples --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 syndat tests examples --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: uv run pytest --cov --cov-branch --cov-report=xml

    - name: Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
